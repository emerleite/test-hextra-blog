<div style="position: relative; padding-bottom: 83.33%; height: 0; overflow: hidden; max-width: 100%;">
  <iframe src="{{ .Get "src" | default (.Get "url") }}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" frameborder="0" allowfullscreen></iframe>
</div>
{{ if .Get "url" }}<p><a href="{{ .Get "url" }}" target="_blank" rel="noopener">View on SlideShare</a></p>{{ end }}
